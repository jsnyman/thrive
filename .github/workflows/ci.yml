name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality:
    name: Lint + Format + Typecheck + Unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run prisma:generate:root

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build API
        run: npm run build:api

      - name: E2E smoke (skips unless E2E_API_BASE_URL is set)
        run: npm run test:e2e
